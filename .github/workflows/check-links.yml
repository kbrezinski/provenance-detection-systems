name: Check Links

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 09:00 UTC

permissions:
  contents: read

jobs:
  links:
    name: Link check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          fail: true
          args: >
            --no-progress
            --verbose
            "./README.md"
            "./**/*.html"
